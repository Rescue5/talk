name: talk-app-dev

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
      target: runtime
      args:
        TORCH_INDEX_URL: https://download.pytorch.org/whl/cpu
        TORCH_SUFFIX: +cpu
    init: true
    command:
      [
        "uvicorn",
        "app.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--reload",
      ]
    environment:
      MODEL_DEVICE: ${MODEL_DEVICE:-cpu}
      JOBS_DATA_DIR: /app/data/jobs
      TALC_CHECKPOINT_PATH: /models/${TALC_CHECKPOINT_FILE:-talc.pt}
      SULFIDE_CHECKPOINT_PATH: /models/${SULFIDE_CHECKPOINT_FILE:-sulfide.pt}
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-536870912}
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./backend:/workspace/talk_app/backend
      - jobs_data:/app/data/jobs
      - type: bind
        source: ${MODEL_DIR:-./models}
        target: /models
        read_only: true
    tmpfs:
      - /tmp:size=1g,mode=1777
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=5)",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 120s
    networks:
      - internal

  frontend:
    image: node:22.14.0-alpine3.21
    init: true
    working_dir: /workspace
    command:
      [
        "sh",
        "-c",
        "if [ -f package-lock.json ]; then npm ci; else npm install --no-audit --no-fund; fi && npm run dev -- --host 0.0.0.0",
      ]
    environment:
      CHOKIDAR_USEPOLLING: ${CHOKIDAR_USEPOLLING:-false}
    volumes:
      - ./frontend:/workspace
      - frontend_node_modules:/workspace/node_modules
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:5173/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - internal

  app:
    image: nginx:1.27.4-alpine3.21
    init: true
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    volumes:
      - ./nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${APP_HOST:-127.0.0.1}:${APP_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - internal

volumes:
  jobs_data:
  frontend_node_modules:

networks:
  internal:
    driver: bridge
