pipeline:
  - type: prepare_image
    enabled: true
    params:
      input_color: rgb
      black_clip: 0.005
      white_clip: 0.995
      border_margin: 0

  - type: local_darkness
    enabled: true
    params:
      background_sigma: 30.0
      local_stats_window: 25
      zscore_clip: 8.0
      eps: 1.0e-6

  - type: multiscale_blackhat
    enabled: true
    params:
      kernel_sizes: [9, 17, 33]
      persistence_threshold: 0.55
      lower_percentile: 2.0
      upper_percentile: 99.0
      min_dynamic_range: 1.0e-6
      max_percentile_samples: 1000000
      eps: 1.0e-6

  - type: normalize_features
    enabled: true
    params:
      features:
        - local_log_darkness
        - local_zscore
        - blackhat_max
        - blackhat_persistence
      lower_percentile: 2.0
      upper_percentile: 99.0
      min_dynamic_range: 1.0e-6
      max_percentile_samples: 1000000
      eps: 1.0e-6

  - type: confidence_fusion
    enabled: true
    params:
      weights:
        local_log_darkness_norm: 0.35
        local_zscore_norm: 0.25
        blackhat_max_norm: 0.30
        blackhat_persistence_norm: 0.10

      vote_thresholds:
        local_log_darkness_norm: 0.60
        local_zscore_norm: 0.55
        blackhat_max_norm: 0.60
        blackhat_persistence_norm: 0.40

  - type: hysteresis
    enabled: true
    params:
      seed_threshold: 0.75
      grow_threshold: 0.40
      seed_min_evidence: 3
      grow_min_evidence: 1
      min_seed_area: 3
      connectivity: 8

  - type: morphology_cleanup
    enabled: true
    params:
      connectivity: 8
      operations:
        - type: remove_small_objects
          enabled: true
          min_area: 4

        - type: fill_small_holes
          enabled: true
          max_area: 4

        - type: opening
          enabled: false
          kernel_size: 3

        - type: closing
          enabled: false
          kernel_size: 3

  - type: component_filter
    enabled: true
    params:
      min_area: 5
      max_area: 5000
      max_elongation: 8.0
      min_solidity: 0.20
      ring_radius: 5
      min_ring_pixels: 10
      insufficient_ring_policy: skip_filter
      min_ring_contrast: 0.03
      min_median_confidence: 0.50
      min_persistence: 0.20
      reject_border_touching: false
      connectivity: 8
      eps: 1.0e-6
