pipeline:
  - type: prepare_image
    enabled: true
    params:
      input_color: rgb
      black_clip: 0.005
      white_clip: 0.995
      border_margin: 0

  - type: local_darkness
    enabled: true
    params:
      background_sigma: 30.0
      local_stats_window: 25
      zscore_clip: 8.0
      eps: 1.0e-6

  - type: multiscale_blackhat
    enabled: true
    params:
      kernel_sizes: [9, 17, 33]
      persistence_threshold: 0.55
      lower_percentile: 2.0
      upper_percentile: 99.0
      min_dynamic_range: 1.0e-6
      max_percentile_samples: 1000000
      eps: 1.0e-6

  - type: normalize_features
    enabled: true
    params:
      features:
        - local_log_darkness
        - local_zscore
        - blackhat_max
      lower_percentile: 2.0
      upper_percentile: 99.0
      min_dynamic_range: 1.0e-6
      max_percentile_samples: 1000000
      eps: 1.0e-6

  - type: confidence_fusion
    enabled: true
    params:
      max_weight: 0.65
      mean_weight: 0.35

      weights:
        local_log_darkness_norm: 0.35
        local_zscore_norm: 0.20
        blackhat_max_norm: 0.35
        blackhat_persistence: 0.10

      vote_thresholds:
        local_log_darkness_norm: 0.40
        local_zscore_norm: 0.35
        blackhat_max_norm: 0.40
        blackhat_persistence: 0.25

  - type: hysteresis
    enabled: true
    params:
      seed_threshold: 0.55
      strong_response_threshold: 0.68
      grow_threshold: 0.20
      seed_min_evidence: 1
      grow_min_evidence: 1
      min_seed_area: 1
      connectivity: 8

  - type: morphology_cleanup
    enabled: true
    params:
      connectivity: 8
      operations:
        - type: remove_small_objects
          enabled: true
          min_area: 4

        - type: fill_small_holes
          enabled: true
          max_area: 4

        - type: opening
          enabled: false
          kernel_size: 3

        - type: closing
          enabled: false
          kernel_size: 3

  - type: component_filter
    enabled: true
    params:
      min_area: 1
      max_area: 30000

      shape_filter_min_area: 20
      max_elongation: 15.0
      min_solidity: 0.05

      ring_radius: 5
      min_ring_pixels: 6
      insufficient_ring_policy: skip_filter
      min_ring_contrast: 0.0

      min_median_confidence: 0.0
      min_persistence: 0.0

      reject_border_touching: false
      connectivity: 8
      eps: 1.0e-6
