schema_version = "0.1"
updated_at = "2026-07-04"

[project]
name = "ore-microscopy-classification"
status = "cv_post_segformer_and_ore_classifier_mvp"
language = "ru"
description = "Автоматическая классификация руды по микроскопическим изображениям полированных шлифов."

[repository]
root = "/Users/macbook/Documents/talk"
initial_files = ["solution.py"]
context_file = "AGENTS.md"
environment_file = "environment.yml"
project_structure_known = false
do_not_infer_structure = true
known_package = "cv_analysis"
implemented_files = ["cv_analysis/__init__.py", "cv_analysis/post_segformer.py", "cv_analysis/post_segformer.yaml", "cv_analysis/sulfide_candidates.py", "cv_analysis/sulfide_candidates.yaml", "ore_classifier/__init__.py", "ore_classifier/config.py", "ore_classifier/utils.py", "ore_classifier/inspection.py", "ore_classifier/dataset.py", "ore_classifier/model.py", "ore_classifier/train.py", "ore_classifier/predict.py", "configs/classifier.yaml", "inspect_dataset.py", "train_classifier.py", "predict.py", "test/run_photometric_tests.py", "test/photometric_tests.yaml", "test/.gitignore", "test/outputs/.gitignore"]

[environment]
conda_env_name = "talk"
python = "3.11"
created = true
preferred_run_prefix = "conda run -n talk"
smoke_test = "passed_with_warnings"
mps_available = false

[environment.dependency_groups]
cv = ["opencv-python-headless", "scikit-image", "pillow", "tifffile"]
ml = ["pytorch=2.3.1=py3.11_cuda12.1_cudnn8_0", "torchvision=0.18.1=py311_cu121", "pytorch-mutex=1.0=cuda", "pytorch-cuda=12.1", "scikit-learn"]
segmentation = ["transformers", "segmentation-models-pytorch", "timm", "git+https://github.com/ChaoningZhang/MobileSAM.git"]
experiments = ["jupyterlab", "ipykernel", "pytest", "tensorboard"]

[environment.notes]
opencv_source = "pip opencv-python-headless; conda opencv was removed after libjxl/protobuf import conflicts"
torchvision_io_warning = "torchvision imports, but torchvision.io image extension warns about missing libjpeg.9.dylib"
image_io_preference = "Use cv2, Pillow, or tifffile unless torchvision.io is explicitly tested"
transformers_upper_bound = "Use transformers>=4.44,<5 with current conda PyTorch 2.3.x; transformers 5.x disables PyTorch below 2.4."
tensorboard_version = "tensorboard 2.20.0 installed in conda environment talk"
cuda_target = "NVIDIA driver is available; environment uses PyTorch 2.3.1 CUDA 12.1 build py3.11_cuda12.1_cudnn8_0."

[data]
expected_labeled_images = 43
raw_data_present = true
image_dir = "data/img"
label_dir = "data/labels"
classes_file = "data/classes.txt"
current_labeled_images = 2
annotation_format = "YOLO segmentation polygons: class_id followed by normalized x y polygon coordinates"
annotation_granularity = "coarse talc-zone polygons for available images; no sulfide object-level masks confirmed"
split_policy = "split by source sample before tile extraction"

[pipeline_context]
implementation_requested = false
large_image_strategy = "tile-based processing"
sulfide_segmentation_mvp = "classical CV by brightness, color/reflectance, morphology, connected components"
sulfide_region_classification = "geometry, texture, dark internal regions, neighborhood statistics, pretrained embeddings, weak supervision or MIL if needed"
talc_zone_model = "SegFormer for coarse talc zones"
talc_candidate_method = "local dark dispersed regions inside predicted talc zones"
image_classifier_inputs = "segmentation masks, region statistics, RGB image features"
interpretability_outputs = ["sulfide masks", "ordinary intergrowth masks", "fine intergrowth masks", "talc zone masks", "talc candidate masks", "final class", "overlay"]

[cv_branch_focus]
scope = "CV algorithms for post-processing SegFormer talc-zone predictions"
segformer_role = "coarse search region only"
target_output = "separate high-precision mask of talc-phase candidates inside the SegFormer zone"
precision_priority = "high"
recall_priority = "secondary"
candidate_signal = "locally dark talc-like regions relative to local surroundings"
methods = ["local darkness", "multi-scale black-hat", "multi-scale DoG", "morphology", "connected components"]
reject_patterns = ["noise", "shadows", "cracks", "scratches", "overly elongated components"]

[cv_post_segformer_module]
module = "cv_analysis.post_segformer"
default_config = "cv_analysis/post_segformer.yaml"
public_class = "TalcCVPipeline"
public_constructor = "TalcCVPipeline.from_yaml(path)"
public_call = "pipeline(image_rgb, segformer_mask)"
input = "RGB image array HxWx3 plus SegFormer coarse talc-zone mask HxW; mask may be bool, integer 0/1, or float thresholded at >0.5"
output = "uint8 binary talc-candidate mask HxW with values 0/1 constrained to the SegFormer search mask"
implemented_processors = ["prepare_image", "local_darkness", "multiscale_blackhat", "normalize_features", "confidence_fusion", "hysteresis", "morphology_cleanup", "component_filter"]
segformer_dependency = "requires SegFormer output mask as input; does not run a SegFormer model"
uses_dynamic_imports = false
uses_torch_module = false
smoke_check = "passed on both data examples: output is uint8 0/1, shape matches input, and mask is constrained to SegFormer area"
notes = "Added explicit black-hat normalization parameters to YAML because per-scale robust normalization needs numeric parameters."
fusion_features = ["local_log_darkness_norm", "local_zscore_norm", "blackhat_max_norm", "blackhat_persistence"]
blackhat_persistence_policy = "Use raw blackhat_persistence in confidence_fusion; do not normalize it again in normalize_features."
hysteresis_seed_strategy = "Create seeds from confidence plus evidence, or from a single strong primary response when strong_response_threshold is set."
component_shape_filter_policy = "Skip elongation and solidity checks for components smaller than shape_filter_min_area."
final_filter_policy = "Soft final filtering: keep area bounds broad, disable confidence/persistence post-filtering by default, and allow small components after hysteresis."

[photometric_test_harness]
directory = "test"
config = "test/photometric_tests.yaml"
runner = "test/run_photometric_tests.py"
output_dir = "test/outputs"
output_policy = "Generated visual outputs are ignored by git; keep only test/outputs/.gitignore tracked."
mask_source = "YOLO segmentation labels from data/labels are rasterized as SegFormer-like coarse masks for local tests."
saved_images_per_case = ["01_original.png", "02_transformed.png", "03_segformer_overlay.png", "04_result_filtering.png", "05_triptych.png"]
transform_groups = ["exposure_gain", "brightness_shift", "contrast", "gamma", "white_balance", "saturation", "hue_shift", "illumination_gradient", "vignette", "local_shadow", "local_highlight", "gaussian_noise", "poisson_noise", "gaussian_blur", "defocus_blur", "jpeg_compression", "quantization", "sharpening", "combinations"]

[sulfide_candidates_module]
module = "cv_analysis.sulfide_candidates"
default_config = "cv_analysis/sulfide_candidates.yaml"
public_function = "segment_sulfides(image, config, sam_refiner=None)"
cli = "conda run -n talk python -m cv_analysis.sulfide_candidates --input data/img --output test/outputs/sulfide_candidates"
model_free = "true for the baseline CV path; optional MobileSAM vit_t refinement is available only when sam.enabled and checkpoint/device are configured"
sam_dependency = "optional MobileSAM boundary refinement through MobileSamRefiner; no AutomaticMaskGenerator, SAM2, negative points, batching, or training"
mobile_sam_checkpoint = "data/models/mobile_sam/mobile_sam.pt"
mobile_sam_preset = "tightened: box_padding=20, box_padding_ratio=0.15, max_positive_points=2, min_coverage=0.65, area_ratio range 0.50..3.00, prefer_larger_mask=false"
outputs = ["cv_mask_uint8_0_255", "refined_mask_uint8_0_255"]
implemented_stages = ["image_to_uint8_rgb", "lab_luminance", "gaussian_blur", "otsu_threshold_with_offset", "morphology", "small_component_removal", "optional_mobile_sam_component_refinement", "optional_overlay"]

[ore_classifier_dataset]
root = "data/dataset/dataset"
top_level_directories = ["set1", "set2", "Панорамы"]
binary_sources = ["set1", "set2"]
excluded_sources_or_classes = ["Панорамы", "Оталькованные руды", "оталькованные"]
source_class_counts = { "set1/difficult" = 68, "set1/ordinary" = 68, "set1/Оталькованные руды" = 84, "set2/difficult" = 418, "set2/ordinary" = 497, "set2/оталькованные" = 87, "Панорамы/Панорамы" = 14 }
binary_task_counts = { "ordinary" = 565, "difficult" = 486 }
notes = "Class folders define labels. Talc and panorama images are excluded from binary train/validation. Exact duplicate file hashes are assigned shared group IDs to avoid fold leakage."

[ore_classifier_module]
package = "ore_classifier"
architecture_boundary = "Standalone supervised image-classification package; keep separate from cv_analysis classical CV modules."
config = "configs/classifier.yaml"
inspection_cli = "conda run -n talk python inspect_dataset.py --config configs/classifier.yaml"
training_cli = "conda run -n talk python train_classifier.py --config configs/classifier.yaml"
training_cli_with_experiment = "conda run -n talk python train_classifier.py --config configs/classifier.yaml --experiment-name convnext_last_stage_v1"
prediction_cli = "conda run -n talk python predict.py --config configs/classifier.yaml --checkpoint path/to/best.ckpt --input path/to/image_or_directory"
model = "shared timm backbone over one global view plus deterministic/random local crops; default backbone convnext_tiny"
target_classes = ["ordinary", "difficult"]
excluded_classes = ["talc", "panoramas", "unmapped_or_non_binary"]
split_policy = "Default training uses a single group-aware stratified train/val split with val_fraction=0.3; all crops inherit the image split; exact SHA duplicates and matching dHash perceptual duplicate buckets share group_id. Cross-validation is available only with data.split_strategy=cross_val."
ablation_controls = ["data.color_mode=rgb|grayscale", "data.num_local_crops=0 for global-only", "model.pooling=mean|gem", "model.finetune_mode=head_only|last_stage|last_two_stages|full_finetune", "model.backbone=convnext_tiny|resnet18", "data.include_sources=[set1]|[set2]|[set1,set2]"]
saved_outputs = ["dataset_index.csv", "dataset_summary.json", "class_mapping.json", "config.yaml", "train_samples.csv", "val_samples.csv", "split_groups.json", "split_audit.json", "history.json", "best.ckpt", "best.pt", "predictions.csv", "metrics_summary.json", "ROC/PR plots", "TensorBoard event logs", "example image copies"]
inference_latency_metrics = ["image_read_ms", "preprocess_views_ms", "transfer_to_device_ms", "model_forward_ms", "postprocess_ms", "total_inference_ms"]
run_dir_policy = "If training.experiment_name is set, outputs go to data.output_dir/experiment_name/train_YYYYMMDD_HHMMSS by default; use --no-timestamp-subdir only when intentional overwrite/reuse is desired."
default_split = "data.split_strategy=train_val, data.val_fraction=0.3; visible files train_samples.csv and val_samples.csv are saved at run root and inside train_val/. split_audit.json checks file_path, rel_path, group_id, sha256, and dhash overlap and stops training on leakage."

[modeling_constraints]
use_pretrained_models = true
use_patch_based_training = true
avoid_tile_leakage = true
treat_coarse_masks_as_noisy = true
minimize_manual_object_annotations = true

