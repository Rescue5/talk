pipeline_config: cv_analysis/post_segformer.yaml
output_dir: test/outputs
random_seed: 20260704

inputs:
  image_dir: data/img
  label_dir: data/labels
  image_glob: "*.JPG"
  sample_limit:

segformer_mask:
  source: yolo_labels

visualization:
  alpha: 0.55
  segformer_color_rgb: [0, 170, 255]
  result_color_rgb: [255, 0, 0]
  draw_triptych_labels: true

tests:
  exposure_gain: [0.7, 1.3]
  brightness_shift: [-0.10, 0.10]
  contrast: [0.7, 1.4]
  gamma: [0.7, 1.5]

  white_balance:
    - name: warm
      gains: [1.20, 1.00, 0.85]
    - name: cool
      gains: [0.85, 1.00, 1.20]
    - name: green
      gains: [1.00, 1.15, 0.90]

  saturation: [0.6, 1.4]
  hue_shift_degrees: [-10, 10]

  illumination_gradient:
    gains: [0.7, 1.3]
    directions:
      - left_to_right
      - right_to_left
      - top_to_bottom
      - diagonal

  vignette_edge_gain: [0.6, 0.8]

  local_shadow:
    - name: soft_center_shadow
      center: [0.50, 0.52]
      axes: [0.34, 0.24]
      angle_degrees: -20
      multiplier: 0.65
      blur_sigma: 180

  local_highlight:
    - name: soft_side_highlight
      center: [0.64, 0.42]
      axes: [0.30, 0.20]
      angle_degrees: 25
      multiplier: 1.35
      blur_sigma: 160

  gaussian_noise_sigma: [0.01, 0.03]
  poisson_peak: [50]
  gaussian_blur_sigma: [1.0, 2.0]
  defocus_blur_kernel: [5]
  jpeg_quality: [70, 40]
  quantization_bits: [6, 5]
  sharpening_amount: [0.5, 1.0]

  combinations:
    - name: low_exposure_noise
      steps:
        - type: exposure_gain
          gain: 0.7
        - type: gaussian_noise
          sigma: 0.02

    - name: low_contrast_blur
      steps:
        - type: contrast
          factor: 0.7
        - type: gaussian_blur
          sigma: 1.5

    - name: gamma_white_balance
      steps:
        - type: gamma
          gamma: 1.5
        - type: white_balance
          gains: [1.15, 1.00, 0.88]

    - name: vignette_jpeg
      steps:
        - type: vignette
          edge_gain: 0.7
        - type: jpeg_compression
          quality: 50

    - name: shadow_noise_blur
      steps:
        - type: local_shadow
          center: [0.45, 0.55]
          axes: [0.36, 0.26]
          angle_degrees: -15
          multiplier: 0.7
          blur_sigma: 180
        - type: gaussian_noise
          sigma: 0.015
        - type: gaussian_blur
          sigma: 1.0
